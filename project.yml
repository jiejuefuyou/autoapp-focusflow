name: FocusFlow
options:
  bundleIdPrefix: com.jiejuefuyou
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.12"
    CURRENT_PROJECT_VERSION: "11"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Hao Sun. All rights reserved."
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
    INFOPLIST_KEY_CFBundleLocalizations: "en,ja,zh-Hans,zh-Hant,ko,es,fr,de"
targets:
  FocusFlow:
    type: application
    platform: iOS
    sources:
      - path: FocusFlow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.focusflow
        PRODUCT_NAME: FocusFlow
        INFOPLIST_KEY_CFBundleDisplayName: FocusFlow Lite
        STOREKIT_CONFIGURATION: FocusFlow/Resources/StoreKitConfiguration.storekit
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
    dependencies:
      - sdk: AppIntents.framework
    entitlements:
      path: FocusFlow/Resources/FocusFlow.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jiejuefuyou.focusflow

  FocusFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FocusFlowTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiejuefuyou.focusflow.tests
        PRODUCT_NAME: FocusFlowTests
    dependencies:
      - target: FocusFlow

schemes:
  FocusFlow:
    build:
      targets:
        FocusFlow: all
    run:
      config: Debug
    archive:
      config: Release
    test:
      config: Debug
      targets:
        - FocusFlowTests
